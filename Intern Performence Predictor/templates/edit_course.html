<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Performance Predictor - Edit Internship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .edit-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #374151;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-save {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>

<body data-role="admin">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages" style="max-width: 600px; margin: 20px auto;">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="edit-container">
        <h2 style="margin-bottom: 24px;">Edit Internship Details</h2>

        <form method="POST" class="replace-history">
            <div class="form-group">
                <label for="course_name">Internship Name</label>
                <input type="text" id="course_name" name="course_name" value="{{ course[1] }}" required>
            </div>

            <div class="form-group">
                <label for="total_expected_tasks">Total Expected Tasks</label>
                <input type="number" id="total_expected_tasks" name="total_expected_tasks" value="{{ course[2] }}"
                    min="1">
                <small style="color: #6b7280; display: block; margin-top: 4px;">Used for calculating completion
                    percentage.</small>
            </div>

            <div class="form-group">
                <label for="duration">Duration</label>
                <input type="text" id="duration" name="duration" value="{{ course[4] if course[4] else '' }}"
                    placeholder="e.g., 2 Months">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" value="{{ course[3] if course[3] else '' }}"
                    placeholder="Brief description of the course">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    💾 Update Internship
                </button>
                <a href="{{ url_for('admin.add_courses') }}" class="btn-outline">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>

</html>
